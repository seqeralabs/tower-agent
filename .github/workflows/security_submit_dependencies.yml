name: Generate dependency graph for tower-agent
on:
  push:
      branches: ['master']


permissions:
  contents: write

jobs:
  dependency-submission:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Graalvm
      uses: graalvm/setup-graalvm@f744c72a42b1995d7b0cbc314bde4bace7ac1fe1 # v1.5.0
      with:
        java-version: '21'
        distribution: 'graalvm-community'
        native-image-musl: 'true'


    - name: Generate and submit dependency graph for tower-agent
      uses: gradle/actions/dependency-submission@748248ddd2a24f49513d8f472f81c3a07d4d50e1 # v4.4.4
      with:
        dependency-resolution-task: "dependencies"
        additional-arguments: "--configuration runtimeClasspath"
        dependency-graph: generate-and-submit
